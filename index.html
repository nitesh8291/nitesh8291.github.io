<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Pdf</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: #007BFF;
            color: white;
            font-size: 26px;
        }

        /* Slider */
        .slider {
            position: relative;
            max-width: 320px;
            margin: 20px auto;
            overflow: hidden;
        }

        .slides {
            display: flex;
            transition: 0.4s;
        }

        .slides img {
            width: 100%;
            height: auto;
        }

        /* Buttons */
        .btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .prev { left: 0; }
        .next { right: 0; }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="header">Core Pdf</div>

<!-- Slider -->
<div class="slider">
    <div class="slides" id="slides">
         <img src="20260317_224817.jpg" alt="Image 1">
        <img src="image1.png" alt="Image 2">
        <img src="image2.png" alt="Image 3">
        <img src="image3.png" alt="Image 4">
        <img src="image4.png" alt="Image 5">
    </div>

    <button class="btn prev" onclick="move(-1)">❮</button>
    <button class="btn next" onclick="move(1)">❯</button>
</div>

<!-- Privacy Policy SAME -->
<div class="content">
    <h1>Privacy Policy</h1>
    <p>Last updated: March, 2026</p>

    <p>Welcome to <strong>Core Pdf</strong>. Your privacy is our top priority.</p>
</div>

<script>
let index = 0;

function move(step) {
    const slides = document.getElementById("slides");
    const total = slides.children.length;

    index += step;

    if (index < 0) index = total - 1;
    if (index >= total) index = 0;

    slides.style.transform = "translateX(" + (-index * 100) + "%)";
}
</script>

</body>
</html>
